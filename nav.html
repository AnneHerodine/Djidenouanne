<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="iframe-body">
  <nav class="site-nav">
    <button class="nav-toggle" id="navToggle" aria-label="Ouvrir le menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-list" id="navList">
      <li><a href="accueil.html" target="contentFrame" class="nav-link">Accueil</a></li>
      <li><a href="Page1.html" target="contentFrame" class="nav-link">P1</a></li>
      <li><a href="page3.html" target="contentFrame" class="nav-link">P2</a></li>
      <li><a href="table.html" target="contentFrame" class="nav-link">TABLE</a></li>
      <li><a href="Tableau.html" target="contentFrame" class="nav-link">TABLEAU</a></li>
      <li><a href="Listes.html" target="contentFrame" class="nav-link">LISTES</a></li>
      <li><a href="formulaire.html" target="contentFrame" class="nav-link">FORMULAIRES</a></li>
      <li><a href="anne.html" target="contentFrame" class="nav-link">ANNE</a></li>
      <li><a href="CV.html" target="contentFrame" class="nav-link">CV</a></li>
    </ul>
  </nav>

  <script>
    const navToggle = document.getElementById('navToggle');
    const navList = document.getElementById('navList');

    function reportHeight() {
      window.parent.postMessage({ type: 'resize', id: 'nav', height: document.body.scrollHeight }, '*');
    }

    navToggle.addEventListener('click', () => {
      const isOpen = navList.classList.toggle('open');
      navToggle.classList.toggle('active');
      navToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      setTimeout(reportHeight, 360);
      reportHeight();
    });

    document.querySelectorAll('.nav-link').forEach(link => {
      link.addEventListener('click', () => {
        navList.classList.remove('open');
        navToggle.classList.remove('active');
        navToggle.setAttribute('aria-expanded', 'false');
        setTimeout(reportHeight, 360);
      });
    });

    // Reçoit du parent (index.html) si on doit être en mode mobile ou non.
    // C'est index.html qui connaît la VRAIE largeur de l'écran, pas cette iframe.
    window.addEventListener('message', (event) => {
      const data = event.data;
      if (!data || data.type !== 'mode') return;

      if (data.mobile) {
        document.body.classList.add('is-mobile');
      } else {
        document.body.classList.remove('is-mobile');
        // si on repasse en PC, on s'assure que le menu n'est pas resté "ouvert"
        navList.classList.remove('open');
        navToggle.classList.remove('active');
        navToggle.setAttribute('aria-expanded', 'false');
      }
      reportHeight();
    });

    // Préviens le parent que la nav est prête à recevoir son mode
    window.addEventListener('load', () => {
      window.parent.postMessage({ type: 'navReady' }, '*');
      reportHeight();
    });
    window.addEventListener('resize', reportHeight);
  </script>
</body>
</html>
